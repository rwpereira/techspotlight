<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Controle Remoto — Tech Spotlight</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #1c2128;
  --bg4: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --text3: #6e7681;
  --purple: #a78bfa;
  --purple-d: #7c3aed;
  --teal: #34d399;
  --teal-bg: #0a2218;
  --coral: #fb923c;
  --coral-bg: #2a1100;
  --red: #f87171;
  --blue: #60a5fa;
  --amber: #fbbf24;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.5rem 1rem 2rem;
  -webkit-user-select: none;
  user-select: none;
}

.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--purple);
  border: 1px solid rgba(167,139,250,0.3);
  border-radius: 4px;
  padding: 4px 14px;
  margin-bottom: 0.75rem;
}

h1 {
  font-size: 1.4rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--purple), #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 1.5rem;
}

/* Join form */
.join-form {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  width: 100%;
  max-width: 320px;
}
.join-form input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1rem;
  outline: none;
}
.join-form input:focus { border-color: var(--purple); }
.join-form button {
  width: 100%;
  padding: 12px;
  background: var(--purple-d);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
}
.join-form button:hover { background: #6d28d9; }

/* Controls panel */
.controls { display: none; width: 100%; max-width: 420px; }
.controls.active { display: flex; flex-direction: column; align-items: center; gap: 1rem; }

.status-bar {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--red);
}
.status-dot.connected { background: var(--teal); }
.status-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text2);
}
.slide-info {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  color: var(--purple);
}

.slide-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  color: var(--text);
  text-align: center;
  min-height: 1.5em;
}

.nav-buttons {
  display: flex;
  gap: 0.75rem;
  width: 100%;
}
.nav-btn {
  flex: 1;
  padding: 1.5rem 1rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 2rem;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-btn:active {
  background: var(--purple-d);
  border-color: var(--purple);
}

.progress-bar {
  width: 100%;
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--purple);
  transition: width 0.3s;
  width: 0%;
}

/* Actions panel */
.actions-panel {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.actions-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.actions-header h3 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.actions-header .tab {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  padding: 3px 8px;
  border-radius: 4px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  transition: all 0.15s;
}
.actions-header .tab.active {
  background: var(--purple-d);
  color: #fff;
  border-color: var(--purple-d);
}
.actions-body {
  padding: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  max-height: 260px;
  overflow-y: auto;
}
.action-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  transition: all 0.15s;
  text-align: left;
  flex: 1 1 calc(50% - 3px);
  min-width: 140px;
}
.action-btn:active {
  background: var(--purple-d);
  border-color: var(--purple);
  color: #fff;
}
.action-btn.global {
  flex: 1 1 auto;
  min-width: 0;
  text-align: center;
}
.action-btn.close-btn {
  border-color: rgba(248,113,113,0.3);
  color: var(--red);
}
.action-btn.close-btn:active {
  background: rgba(248,113,113,0.2);
  border-color: var(--red);
}

.no-actions {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text3);
  padding: 12px;
  text-align: center;
  width: 100%;
}

/* Connected list */
.connected-list {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
}
.connected-list h3 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.4rem;
}
.connected-list ul { list-style: none; }
.connected-list li {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--text2);
  padding: 3px 0;
}
.connected-list li::before {
  content: '>';
  color: var(--teal);
  margin-right: 8px;
}

.msg {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--coral);
  text-align: center;
  min-height: 1.2em;
}
</style>
</head>
<body>

<div class="logo">Remote Control</div>
<h1>Tech Spotlight</h1>

<!-- Join screen -->
<div class="join-form" id="joinForm">
  <input type="text" id="nameInput" placeholder="Seu nome (ex: Bruno)" autofocus>
  <button onclick="joinAsController()">Conectar</button>
</div>

<!-- Controls screen -->
<div class="controls" id="controlsPanel">
  <div class="status-bar">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Conectando...</span>
    </div>
    <span class="slide-info" id="slideInfo">- / -</span>
  </div>

  <div class="slide-label" id="slideLabel">--</div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="nav-buttons">
    <div class="nav-btn" onclick="sendNav('prev')">◀</div>
    <div class="nav-btn" onclick="sendNav('next')">▶</div>
  </div>

  <!-- Actions panel -->
  <div class="actions-panel">
    <div class="actions-header">
      <h3>Acoes do Slide</h3>
      <div style="display:flex;gap:4px">
        <span class="tab active" id="tabSlide" onclick="showTab('slide')">Slide</span>
        <span class="tab" id="tabGlobal" onclick="showTab('global')">Geral</span>
      </div>
    </div>
    <div class="actions-body" id="slideActionsBody">
      <div class="no-actions">Nenhuma acao disponivel neste slide</div>
    </div>
    <div class="actions-body" id="globalActionsBody" style="display:none"></div>
  </div>

  <div class="connected-list" id="connectedList" style="display:none">
    <h3>Controladores conectados</h3>
    <ul id="controllerNames"></ul>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
let ws;
let totalSlides = 0;
let currentActions = [];
let activeTab = 'slide';

const labels = [
  'README.md','agenda.ts','stats.json',
  'ext-integration.ts','health-dashboard.ts','landing-page.astro',
  'overview-bruno.md','pr-tools.sh','rat-offline.html','overview-thielson.md',
  'wins.log','roadmap.todo','exit.ts'
];

// Global actions always available
const GLOBAL_ACTIONS = [
  { id: 'close-modal', label: '✕ Fechar Modal', action: 'closeModals', cls: 'close-btn' },
  { id: 'ss-prev', label: '‹ Img Anterior', action: 'ssNav', params: { dir: -1 } },
  { id: 'ss-next', label: 'Img Proxima ›', action: 'ssNav', params: { dir: 1 } },
  { id: 'toggle-timer', label: '⏱ Timer', action: 'toggleTimer' },
  { id: 'fullscreen', label: '⛶ Fullscreen', action: 'toggleFullscreen' }
];

function joinAsController() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { document.getElementById('nameInput').focus(); return; }
  document.getElementById('joinForm').style.display = 'none';
  document.getElementById('controlsPanel').classList.add('active');
  connect(name);
  renderGlobalActions();
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinAsController();
});

function connect(name) {
  const host = location.hostname || 'localhost';
  const port = location.port || '3030';
  ws = new WebSocket(`ws://${host}:${port}`);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'controller-join', name }));
    setStatus(true, `Conectado como ${name}`);
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'role':
        totalSlides = msg.totalSlides || 0;
        updateSlide(msg.currentSlide || 0, []);
        break;
      case 'slide-update':
        totalSlides = msg.totalSlides || totalSlides;
        updateSlide(msg.currentSlide, msg.slideActions || []);
        break;
      case 'controllers':
        showControllers(msg.names);
        break;
      case 'presenter-disconnected':
        setStatus(false, 'Presenter desconectado');
        showMsg('Aguardando presenter reconectar...');
        break;
    }
  };

  ws.onclose = () => {
    setStatus(false, 'Desconectado');
    showMsg('Reconectando em 3s...');
    setTimeout(() => connect(name), 3000);
  };
}

function sendNav(action) {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'navigate', action }));
  }
}

function sendAction(action, params) {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'action', action, params }));
  }
}

function updateSlide(n, actions) {
  document.getElementById('slideInfo').textContent = `${n + 1} / ${totalSlides}`;
  document.getElementById('slideLabel').textContent = labels[n] || `slide-${n}`;
  const pct = totalSlides > 1 ? (n / (totalSlides - 1)) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  currentActions = actions || [];
  renderSlideActions();
}

function renderSlideActions() {
  const body = document.getElementById('slideActionsBody');
  if (currentActions.length === 0) {
    body.innerHTML = '<div class="no-actions">Nenhuma acao disponivel neste slide</div>';
    return;
  }
  body.innerHTML = currentActions.map(a =>
    `<button class="action-btn" onclick="sendAction('${a.action}', ${JSON.stringify(a.params || {}).replace(/"/g, '&quot;')})">${a.label}</button>`
  ).join('');
}

function renderGlobalActions() {
  const body = document.getElementById('globalActionsBody');
  body.innerHTML = GLOBAL_ACTIONS.map(a =>
    `<button class="action-btn global ${a.cls || ''}" onclick="sendAction('${a.action}', ${JSON.stringify(a.params || {}).replace(/"/g, '&quot;')})">${a.label}</button>`
  ).join('');
}

function showTab(tab) {
  activeTab = tab;
  document.getElementById('tabSlide').classList.toggle('active', tab === 'slide');
  document.getElementById('tabGlobal').classList.toggle('active', tab === 'global');
  document.getElementById('slideActionsBody').style.display = tab === 'slide' ? 'flex' : 'none';
  document.getElementById('globalActionsBody').style.display = tab === 'global' ? 'flex' : 'none';
}

function setStatus(connected, text) {
  document.getElementById('statusDot').classList.toggle('connected', connected);
  document.getElementById('statusText').textContent = text;
}

function showControllers(names) {
  const list = document.getElementById('connectedList');
  const ul = document.getElementById('controllerNames');
  if (names.length === 0) { list.style.display = 'none'; return; }
  list.style.display = 'block';
  ul.innerHTML = names.map(n => `<li>${n}</li>`).join('');
}

function showMsg(text) {
  document.getElementById('msg').textContent = text;
  if (text) setTimeout(() => { document.getElementById('msg').textContent = ''; }, 5000);
}
</script>
</body>
</html>
